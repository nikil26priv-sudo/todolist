<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List with Progress</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>💼 Your To-Do List 📋</h1>

        <!-- Input Section -->
        <div class="add-task">
            <input type="text" id="task-input" placeholder="Enter a new task...">
            <button onclick="addTask()">Add Task</button>
        </div>

        <!-- To-Do List Display -->
        <ul id="task-list">
            <!-- Tasks will be displayed here dynamically -->
        </ul>

        <!-- Progress Section -->
        <div id="progress">
            <p>📝 Progress: <span id="completion-percentage">0.00</span>% completed</p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
